# CI 变量
# CI_REGISTRY_USER      # 登录镜像仓库的用户名
# CI_REGISTRY_PASSWORD  # 登录镜像仓库的密码（通常是 Token）
# CI_REGISTRY           # Docker 镜像仓库地址，例如:registry.gitlab.com
# CI_REGISTRY_IMAGE     # 镜像仓库路径，例如:registry.gitlab.com/<group>/<project>
# WEB_SERVER_HOST       # 目标服务器 IP / 域名
# WEB_SERVER_USER       # SSH 登录用户
# SERVER_SSH_KEY        # SSH 私钥（用于免密码登录）

stages:
  - build
  - push
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  CONTAINER_NAME: ruoyi-monitor-web

# ---------- 构建 ----------
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $IMAGE_TAG .
  only:
    - main

# ---------- 推送 ----------
push:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $IMAGE_TAG
  only:
    - main

# ---------- 部署 ----------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - |
      ssh -o StrictHostKeyChecking=no $WEB_SERVER_USER@$WEB_SERVER_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $IMAGE_TAG &&
        docker stop $CONTAINER_NAME || true &&
        docker rm $CONTAINER_NAME || true &&
        docker run -d -p 80:80 --name $CONTAINER_NAME $IMAGE_TAG
      "
  only:
    - main
